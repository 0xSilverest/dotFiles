monitor=HDMI-A-2,1920x1080@60,0x0,1,transform,1
monitor=DP-2,2560x1440@120,1080x360,1

exec-once = xrandr --output DP-2 --primary
# Push the Wayland env into the D-Bus/systemd activation environment, then start the
# xdg-desktop-portal frontend directly. Its systemd activation fails under Hyprland
# (graphical-session.target is inactive), so without this, portal-using apps fall back
# to their own GTK/Thunar file chooser instead of the silverest backend.
exec-once = dbus-update-activation-environment --systemd --all && /usr/libexec/xdg-desktop-portal -r
# Pre-warm the silverest file-chooser backend at login. Same reason as above:
# graphical-session.target is inactive under Hyprland, so the unit's WantedBy=
# never auto-starts it. Starting it here keeps the JVM daemon resident, so the
# FIRST app file-dialog hits a warm process instead of cold-booting (which blocks
# the calling app). After a rebuild: systemctl --user restart filechooser-portal.service
exec-once = systemctl --user start filechooser-portal.service
exec-once = ~/bin/zzz-overlay > /tmp/zzz-overlay.log 2>&1

cursor {
    default_monitor = DP-2
}

workspace = 1, monitor:DP-2, name:λ, default:true
workspace = 2, monitor:DP-2, name:β
workspace = 3, monitor:DP-2, name:γ
workspace = 6, monitor:DP-2, name:Ψ

workspace = 4, monitor:HDMI-A-2, name:δ, default:true
workspace = 5, monitor:HDMI-A-2, name:ε

windowrule {
  name = windowrule-14
  workspace = 5
  monitor = HDMI-A-2
  match:class = ^(discord)$
}

windowrule {
  name = windowrule-15
  workspace = 5
  monitor = HDMI-A-2
  match:class = ^(teams-for-linux)$
}

bind = SUPER ALT, S, moveworkspacetomonitor, current HDMI-A-2
bind = SUPER ALT, D, moveworkspacetomonitor, current DP-2
