# ── ChronoTask ─────────────────────────────────────────
# SUPER+P: pick a routine and start the overlay (rofi menu).
bind = SUPER, P, exec, chrono-overlay "$(chrono-overlay --list | rofi -dmenu -p Routine)"
# SUPER+SHIFT+P: enter timer-control mode, then press a key below; Esc/Enter exits.
bind = SUPER SHIFT, P, submap, chrono
submap = chrono
bind = , p, exec, chrono-ctrl pause
bind = , r, exec, chrono-ctrl resume
bind = , n, exec, chrono-ctrl next
bind = , b, exec, chrono-ctrl previous
bind = , e, exec, chrono-ctrl extend 5
bind = , s, exec, notify-send ChronoTask "$(chrono-ctrl status)"
bind = , a, exec, chrono-ctrl abort
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset
