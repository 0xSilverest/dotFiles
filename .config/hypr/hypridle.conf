general {
    # use existing hyprlock instance if one is up, else launch
    lock_cmd = pidof hyprlock || hyprlock
    # lock before the system sleeps (harmless on a desktop that never suspends)
    before_sleep_cmd = loginctl lock-session
}

# Auto-lock after 1 hour of no activity.
# The waybar idle_inhibitor toggle suspends this when activated.
listener {
    timeout = 3600
    on-timeout = loginctl lock-session
}
